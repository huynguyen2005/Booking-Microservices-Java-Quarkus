<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyVoyage</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-container-low': '#f2f4f6','on-surface': '#191c1e',background: '#f7f9fb','secondary-fixed': '#baeaff','on-secondary-fixed': '#001f29','on-tertiary': '#ffffff','primary-fixed-dim': '#a7c8ff','outline-variant': '#c3c6d1','on-primary': '#ffffff','tertiary-fixed': '#ffdbca','surface-container-lowest': '#ffffff','primary-container': '#003366','on-surface-variant': '#43474f','on-background': '#191c1e','on-tertiary-fixed-variant': '#723610','tertiary-container': '#592300',surface: '#f7f9fb','on-tertiary-fixed': '#341100','secondary-container': '#9ae1ff','on-secondary-container': '#09657f','on-primary-fixed': '#001b3c','inverse-on-surface': '#eff1f3','inverse-primary': '#a7c8ff',primary: '#001e40',tertiary: '#381300','surface-tint': '#3a5f94','primary-fixed': '#d5e3ff',error: '#ba1a1a','surface-bright': '#f7f9fb','error-container': '#ffdad6','surface-variant': '#e0e3e5','surface-container-high': '#e6e8ea','surface-container-highest': '#e0e3e5','surface-dim': '#d8dadc',secondary: '#0c6780',outline: '#737780','sky-accent': '#FF8C00'
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
            spacing: { 'margin-mobile': '16px', 'container-max': '1280px', 'margin-desktop': '64px', gutter: '24px', 'stack-lg': '32px', 'stack-md': '16px', 'section-gap': '80px', unit: '8px', 'stack-sm': '8px' },
            fontFamily: { 'body-md': ['Inter'], 'body-lg': ['Inter'], h1: ['Plus Jakarta Sans'], h2: ['Plus Jakarta Sans'], h3: ['Plus Jakarta Sans'], 'label-caps': ['Inter'], 'plus-jakarta': ['Plus Jakarta Sans'] },
            fontSize: { 'body-md': ['16px', { lineHeight: '1.6', fontWeight: '400' }], 'body-lg': ['18px', { lineHeight: '1.6', fontWeight: '400' }], h1: ['48px', { lineHeight: '1.2', letterSpacing: '-0.02em', fontWeight: '700' }], h2: ['32px', { lineHeight: '1.3', fontWeight: '700' }], h3: ['24px', { lineHeight: '1.4', fontWeight: '600' }], 'label-caps': ['12px', { lineHeight: '1.2', letterSpacing: '0.05em', fontWeight: '600' }] }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .flight-path { position: relative; }
      .flight-path::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #c3c6d1; z-index: 0; }
      .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0px 10px 30px rgba(0, 51, 102, 0.08); }
      .flight-path-line { height: 2px; background: repeating-linear-gradient(to right, #001e40 0, #001e40 4px, transparent 4px, transparent 8px); }
      .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
      .seat-map-bg { background: linear-gradient(180deg, #f0f4f8 0%, #ffffff 100%); }
      .plane-outline { border-left: 2px solid #c3c6d1; border-right: 2px solid #c3c6d1; border-radius: 120px 120px 40px 40px; }
      .step-completed { background-color: #001e40; color: white; }
      .step-active { border: 2px solid #001e40; color: #001e40; font-weight: 700; }
      .step-upcoming { border: 2px solid #c3c6d1; color: #737780; }
      .primary-cta { background-color: #FF8C00; transition: all 0.3s ease; }
      .primary-cta:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); }
      .orange-cta { background-color: #FF8C00; transition: all 0.3s ease; }
      .orange-cta:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); transform: translateY(-1px); }
      .ticket-perforation { border-left: 2px dashed rgba(0, 51, 102, 0.1); }
      .semi-circle-top { width: 24px; height: 12px; background-color: #f7f9fb; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; position: absolute; top: -1px; left: -13px; }
      .semi-circle-bottom { width: 24px; height: 12px; background-color: #f7f9fb; border-top-left-radius: 24px; border-top-right-radius: 24px; position: absolute; bottom: -1px; left: -13px; }
      .btn-orange-glow:hover { box-shadow: 0 0 15px rgba(255, 140, 0, 0.4); }
      .bg-sky-gradient { background: radial-gradient(circle at top right, #e0f2fe 0%, #f7f9fb 100%); }
      .cta-glow:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body-md antialiased min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
