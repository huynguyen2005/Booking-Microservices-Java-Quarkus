quarkus.http.port=8080
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=booking-microservices
quarkus.http.auth.proactive=false

gateway.user-service-url=${GATEWAY_USER_SERVICE_URL:http://localhost:8088}
gateway.flight-service-url=${GATEWAY_FLIGHT_SERVICE_URL:http://localhost:8081}
gateway.passenger-service-url=${GATEWAY_PASSENGER_SERVICE_URL:http://localhost:8082}
gateway.booking-service-url=${GATEWAY_BOOKING_SERVICE_URL:http://localhost:8083}
gateway.payment-service-url=${GATEWAY_PAYMENT_SERVICE_URL:http://localhost:8084}
gateway.ticket-service-url=${GATEWAY_TICKET_SERVICE_URL:http://localhost:8085}
gateway.checkin-service-url=${GATEWAY_CHECKIN_SERVICE_URL:http://localhost:8087}

# CORS Configuration - Development Catch-all
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,Origin,X-Requested-With,X-Forwarded-For,X-Forwarded-Proto,X-Forwarded-Port
quarkus.http.cors.exposed-headers=Location,Content-Disposition,Authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=3600

# Public Permissions
quarkus.http.auth.permission.public.paths=/api/auth/register,/api/auth/login,/api/flights,/api/airports
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=GET,POST,OPTIONS
