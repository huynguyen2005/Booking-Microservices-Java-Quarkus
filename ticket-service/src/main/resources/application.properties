quarkus.http.port=8085
quarkus.swagger-ui.always-include=true
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/ticket_db}
quarkus.hibernate-orm.database.generation=update
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=booking-microservices
quarkus.http.auth.proactive=true
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}
mp.messaging.incoming.payment-completed-in.connector=smallrye-rabbitmq
mp.messaging.incoming.payment-completed-in.queue.name=payment-completed-queue
mp.messaging.incoming.payment-completed-in.exchange.name=payment.events
mp.messaging.incoming.payment-completed-in.exchange.declare=true
mp.messaging.incoming.payment-completed-in.exchange.type=topic
mp.messaging.incoming.payment-completed-in.routing-keys=payment.completed
mp.messaging.incoming.checkin-completed-in.connector=smallrye-rabbitmq
mp.messaging.incoming.checkin-completed-in.queue.name=ticket-checkin-completed-queue
mp.messaging.incoming.checkin-completed-in.exchange.name=checkin.events
mp.messaging.incoming.checkin-completed-in.exchange.declare=true
mp.messaging.incoming.checkin-completed-in.exchange.type=topic
mp.messaging.incoming.checkin-completed-in.routing-keys=checkin.completed
mp.messaging.incoming.booking-cancelled-in.connector=smallrye-rabbitmq
mp.messaging.incoming.booking-cancelled-in.queue.name=ticket-booking-cancelled-queue
mp.messaging.incoming.booking-cancelled-in.exchange.name=booking.events
mp.messaging.incoming.booking-cancelled-in.exchange.declare=true
mp.messaging.incoming.booking-cancelled-in.exchange.type=topic
mp.messaging.incoming.booking-cancelled-in.routing-keys=booking.cancelled
mp.messaging.outgoing.ticket-issued-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.ticket-issued-out.exchange.name=ticket.events
mp.messaging.outgoing.ticket-issued-out.exchange.declare=true
mp.messaging.outgoing.ticket-issued-out.exchange.type=topic
mp.messaging.outgoing.ticket-issued-out.default-routing-key=ticket.issued

quarkus.http.cors=true
quarkus.http.cors.origins=*
